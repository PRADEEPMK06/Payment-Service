apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      serviceAccountName: payment-sa

      containers:
        - name: payment-service

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8080
              name: http

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-k8s-secret
                  key: DB_PASSWORD

          resources:
{{ toYaml .Values.resources | indent 12 }}