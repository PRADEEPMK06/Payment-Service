apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      serviceAccountName: payment-sa
      containers:
        - name: payment-service
          image: 383313559988.dkr.ecr.us-east-1.amazonaws.com/payment-service:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-k8s-secret
                  key: DB_PASSWORD