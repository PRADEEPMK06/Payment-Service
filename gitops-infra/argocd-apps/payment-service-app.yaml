apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/<YOUR-GITHUB-USERNAME>/<YOUR-REPO-NAME>.git'
    targetRevision: HEAD
    path: gitops-infra/charts/payment-service 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: payment
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true